<!DOCTYPE html>
<html lang="lb">
<head>
    <title>Fox Hunt Secret Entry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('bg.jpg') no-repeat center center fixed; 
            background-size: cover;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 90%;
            width: 350px;
            text-align: center;
        }

        .header-image {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 { color: #333; font-size: 1.5rem; margin-top: 0; }
        p { color: #666; margin-bottom: 20px; }

        input { 
            padding: 12px; 
            font-size: 16px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            width: 100%; 
            box-sizing: border-box; 
            margin-bottom: 15px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus { border-color: #ff6600; }

        /* Styling für den Fehlerzustand des Inputs */
        input.error {
            border-color: #d32f2f;
            background-color: #fff1f1;
            animation: shake 0.4s;
        }

        /* Die neue Fehlermeldung im Container */
        #error-box {
            display: none;
            color: #d32f2f;
            background: #ffcdd2;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #d32f2f;
        }

        button { 
            padding: 12px; 
            font-size: 18px; 
            background: #ff6600; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }

        /* Animation für das Wackeln */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <img src="fox-logo.png" alt="Dem Pascale säi Rallye" class="header-image">

        <h1>🦊 E Numm Fonnt?</h1>
        <p>Gëff de Numm hei an,<br>an du kriss deen nächsten Hiweis:</p>
        
        <div id="error-box">Dat war net richteg! Sich weider!</div>
        
        <input type="text" id="foxName" placeholder="hei hin domat..." autocomplete="off">
        <button onclick="checkName()">Ok Knäppchen</button>
    </div>

    <script>
        function checkName() {
            var input = document.getElementById("foxName");
            var errorBox = document.getElementById("error-box");
            var name = input.value.toLowerCase().trim();
            
            // Fehlermeldung und rote Farbe bei jedem neuen Klick kurz zurücksetzen
            errorBox.style.display = "none";
            input.classList.remove("error");

            if (name === "mozart") {
                window.location.href = "sample.html"; 
            } else if (name === "silverfox") {
                window.location.href = "https://goo.gl/maps/xyz123";
            } else {
                // Wenn es falsch ist:
                errorBox.style.display = "block"; // Nachricht zeigen
                input.classList.add("error");    // Input rot färben & wackeln
                
                // Nach 4 Sekunden wieder schick machen
                setTimeout(function() {
                    errorBox.style.display = "none";
                    input.classList.remove("error");
                }, 4000);
            }
        }

        // Erlaubt das Abschicken mit der Enter-Taste
        document.getElementById("foxName").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkName();
            }
        });
    </script>
</body>
</html>
